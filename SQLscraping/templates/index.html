<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Task Managerr</title>

</head>
<body>
    <h1> Task Manager </h1>
    <form action = "/add" method ="POST">
        <input type ="text" name = "title" placeholder = "Enter task here.....">
        <button type = "submit">ADD</button>
    </form>
    
    {% for task in tasks %}
    <ul>
    <p><li>
        {% if task.done %}
           <s> {{task.title}}</s> 
        {% else %}
            {{task.title}}
        {% endif %}
    
        <a href = "/done/{{task.id}}" style =" margin : 0px 10px 0px 10px"> Done </a> 
        <a href = "/delete/{{task.id}}"> Delete</a>
    </p> </li></ul>   
    {% endfor %}

    

</body>
</html>
